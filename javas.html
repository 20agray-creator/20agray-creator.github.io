<html>
<body>
<h1 style="text-align:center;">Time</h1>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<div id="myPlot" style="width:100%;max-width:600px"></div>

<script>
const xArray = ["User 1", "User 2", "User 3", "User 4", "User 5"];
const yArray = [55, 49, 44, 24, 15];
  
const data = [{
  x:xArray,
  y:yArray,
  type:"bar",
  orientation:"v",
  marker: {color:"rgba(128,0,128,0.6)"}
}];

const layout = {title:"Time Spent"};

Plotly.newPlot("myPlot", data, layout);
</script>
<button type="button" onclick="document.getElementById('demo').innerHTML = Date()">
Click to display Date and Time.</button>

<p id="demo"></p>
<p style="text-align:center;"><a href="index.html">Home Page</a></p>
</body>
</html>
